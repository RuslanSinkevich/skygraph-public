<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SkyGraph Angular — Coming Soon</title>
  <meta name="robots" content="noindex" />
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #111827;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #0a0a0a; color: #f4f4f5; }
    }
    .wrap {
      max-width: 480px;
      padding: 32px;
      text-align: center;
    }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 999px;
      background: #e0e7ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    @media (prefers-color-scheme: dark) {
      .badge { background: #312e81; color: #c7d2fe; }
    }
    h1 { font-size: 32px; margin: 0 0 12px; }
    p { font-size: 16px; line-height: 1.5; opacity: 0.7; margin: 0 0 24px; }
    a {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 8px;
      background: #111827;
      color: #fafafa;
      text-decoration: none;
      font-weight: 500;
    }
    @media (prefers-color-scheme: dark) {
      a { background: #fafafa; color: #111827; }
    }
    .links { margin-top: 8px; }
    .links a + a { margin-left: 8px; }
    .secondary {
      background: transparent !important;
      color: inherit !important;
      border: 1px solid currentColor;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <span class="badge">Coming soon</span>
    <h1>SkyGraph Angular</h1>
    <p>The Angular adapter is in planning stage. Star us on GitHub to follow updates.</p>
    <div class="links">
      <a href="/">← Back to React demo</a>
      <a href="https://github.com/RuslanSinkevich/skygraph-public" class="secondary">GitHub</a>
    </div>
  </div>
</body>
</html>
